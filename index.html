<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MatiLibras</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <!-- HEADER (muda por tela) -->
    <header class="header">
      <h1 id="headerTitle" class="header__title"></h1>
    </header>

    <!-- MAIN -->
    <main class="main">

        <!-- TELA: PESQUISA -->
        <section id="screen-search" class="screen is-active" aria-label="Pesquisa">
            <div class="video-card">
                <div class="video-placeholder">
                    <div class="video-placeholder__label">Buscar sinais<br/><video width="640" height="360" controls poster="capa.jpg">
                                                                                <source src="Videos/um.mp4" type="video/mp4">                                                                                
                                                                                <source src="Videos/um.webm" type="video/webm">                                                                                
                                                 Seu navegador não suporta a tag de vídeo. <!-- Fallback para navegadores antigos -->
                                                                            </video></div>
                </div>
            </div>

            <div class="search-row">
                <div class="search-input">
                    <span class="icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                        </svg></span>
                    <input id="searchInputHome" type="text" placeholder="Buscar sinais" autocomplete="off" />
                    <button id="btnCamera" class="icon-btn" title="Câmera (placeholder)" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-camera-fill" viewBox="0 0 16 16">
                                                                                                            <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                                                                                                            <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0"/>
                                                                                                        </svg>
                    </button>
                </div>
                    <button id="btnMic" class="mic-btn" title="Microfone (placeholder)" type="button"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-mic-fill" viewBox="0 0 16 16">
                                                                                                <path d="M5 3a3 3 0 0 1 6 0v5a3 3 0 0 1-6 0z"/>
                                                                                                <path d="M3.5 6.5A.5.5 0 0 1 4 7v1a4 4 0 0 0 8 0V7a.5.5 0 0 1 1 0v1a5 5 0 0 1-4.5 4.975V15h3a.5.5 0 0 1 0 1h-7a.5.5 0 0 1 0-1h3v-2.025A5 5 0 0 1 3 8V7a.5.5 0 0 1 .5-.5"/>
                                                                                            </svg>
                    </button>
            </div>

            <div class="results">
                <div class="results__head">
                    <span class="results__title">Linguagem Matemática</span>
                    <span id="resultsCount" class="results__count">0</span>
                </div>
                <div id="resultsList" class="results__list"></div>
            </div>


        </section>

            <!-- TELA: DICIONÁRIO -->
        <section id="screen-dict" class="screen" aria-label="Dicionário">
            <div class="top-search">
                <span class="icon" aria-hidden="true"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-search" viewBox="0 0 16 16">
                                                            <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0"/>
                                                        </svg></span>
                <input id="searchInputDict" type="text" placeholder="Buscar sinais" autocomplete="off"/>
            </div>

            <div class="hero">
                <h2 class="hero__title">Matemática</h2>
            </div>

            <div id="categoryGrid" class="grid"></div>

            <div class="divider"></div>

            <h3 class="section-title">Sinais</h3>
            <div id="dictSignalsList" class="list"></div>
        </section>

      <!-- TELA: LIBRAS -->
        <section id="screen-libras" class="screen" aria-label="LIBRAS">
            <h2 class="screen-title">Aula básico em Libras</h2>

            <div id="lessonsList" class="lesson-list"></div>
        </section>

      <!-- TELA: CONTA -->
        <section id="screen-account" class="screen" aria-label="Conta">
            <div class="card">
                <h2 class="card__title">CONTA</h2>

                <form id="loginForm" class="form">
                    <label class="label" for="email">E-mail</label>
                    <input id="email" class="input" type="email" placeholder="exemplo@gmail.com" required />

                    <label class="label" for="password">Senha</label>
                    <input id="password" class="input" type="password" placeholder="••••••••" required />

                    <button class="btn" type="submit">Entrar</button>
                </form>

                <div id="accountBox" class="account-box is-hidden">
                    <p class="account-box__text">
                     Logado como: <strong id="userEmail"></strong>
                    </p>
                    <button id="logoutBtn" class="btn btn--secondary" type="button">Sair</button>
                </div>
            </div>
        </section>

    </main>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav" aria-label="Navegação">
      <button class="nav-item is-active" data-route="search" type="button">
        <div class="nav-item__icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-sort-alpha-down" viewBox="0 0 16 16">
                                        <path fill-rule="evenodd" d="M10.082 5.629 9.664 7H8.598l1.789-5.332h1.234L13.402 7h-1.12l-.419-1.371zm1.57-.785L11 2.687h-.047l-.652 2.157z"/>
                                        <path d="M12.96 14H9.028v-.691l2.579-3.72v-.054H9.098v-.867h3.785v.691l-2.567 3.72v.054h2.645zM4.5 2.5a.5.5 0 0 0-1 0v9.793l-1.146-1.147a.5.5 0 0 0-.708.708l2 1.999.007.007a.497.497 0 0 0 .7-.006l2-2a.5.5 0 0 0-.707-.708L4.5 12.293z"/>
                                    </svg>
        </div>
            <div class="nav-item__label">Pesquisa</div>
        </button>

        <button class="nav-item" data-route="dict" type="button">
            <div class="nav-item__icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-grid-fill" viewBox="0 0 16 16">
                                            <path d="M1 2.5A1.5 1.5 0 0 1 2.5 1h3A1.5 1.5 0 0 1 7 2.5v3A1.5 1.5 0 0 1 5.5 7h-3A1.5 1.5 0 0 1 1 5.5zm8 0A1.5 1.5 0 0 1 10.5 1h3A1.5 1.5 0 0 1 15 2.5v3A1.5 1.5 0 0 1 13.5 7h-3A1.5 1.5 0 0 1 9 5.5zm-8 8A1.5 1.5 0 0 1 2.5 9h3A1.5 1.5 0 0 1 7 10.5v3A1.5 1.5 0 0 1 5.5 15h-3A1.5 1.5 0 0 1 1 13.5zm8 0A1.5 1.5 0 0 1 10.5 9h3a1.5 1.5 0 0 1 1.5 1.5v3a1.5 1.5 0 0 1-1.5 1.5h-3A1.5 1.5 0 0 1 9 13.5z"/>
                                        </svg>
            </div>
            <div class="nav-item__label">Dicionário</div>
        </button>

        <button class="nav-item" data-route="libras" type="button">
            <div class="nav-item__icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-book-half" viewBox="0 0 16 16">
                                            <path d="M8.5 2.687c.654-.689 1.782-.886 3.112-.752 1.234.124 2.503.523 3.388.893v9.923c-.918-.35-2.107-.692-3.287-.81-1.094-.111-2.278-.039-3.213.492zM8 1.783C7.015.936 5.587.81 4.287.94c-1.514.153-3.042.672-3.994 1.105A.5.5 0 0 0 0 2.5v11a.5.5 0 0 0 .707.455c.882-.4 2.303-.881 3.68-1.02 1.409-.142 2.59.087 3.223.877a.5.5 0 0 0 .78 0c.633-.79 1.814-1.019 3.222-.877 1.378.139 2.8.62 3.681 1.02A.5.5 0 0 0 16 13.5v-11a.5.5 0 0 0-.293-.455c-.952-.433-2.48-.952-3.994-1.105C10.413.809 8.985.936 8 1.783"/>
                                        </svg>
            </div>
            <div class="nav-item__label">Libras</div>
        </button>

        <button class="nav-item" data-route="account" type="button">
            <div class="nav-item__icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-person-fill" viewBox="0 0 16 16">
                                        <path d="M3 14s-1 0-1-1 1-4 6-4 6 3 6 4-1 1-1 1zm5-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
                                    </svg>
            </div>
            <div class="nav-item__label">Conta</div>
        </button>
    </nav>
  </div>

  <script src="./app.js"></script>
</body>
</html>
